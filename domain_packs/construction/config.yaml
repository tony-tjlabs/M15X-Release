# ============================================================================
# 건설현장 도메인 설정 (Construction Domain Config)
# ============================================================================
# src/pipeline/metrics.py, src/pipeline/lone_work.py에서 추출한 실제 값
# 이 파일은 읽기 전용 참조 문서로 사용 (코드 변경 시 동기화 필요)
# ============================================================================

domain: construction
display_name: "스마트 건설현장"
description: "반도체 클러스터 건설현장 안전/생산성 분석"

# ─── EWI (Effective Work Intensity) 설정 ───────────────────────────────────
# 출처: src/pipeline/metrics.py (lines 30-36)
ewi:
  # 활성도 임계값 (active_ratio 기준)
  high_active_threshold: 0.60   # 고활성: 활발한 이동/운반 작업
  low_active_threshold: 0.15    # 저활성 하한: 이 미만은 대기로 분류

  # EWI 계산 가중치
  high_work_weight: 1.0         # 고활성 작업
  low_work_weight: 0.5          # 저활성 작업
  standby_weight: 0.2           # 대기 (크레인 대기/감독 등 실질 작업 포함)

  # 음영지역 신뢰도 임계값
  gap_reliable_threshold: 0.20  # 이 비율 이하면 recorded_min을 분모로 대체

  # EWI 등급 판정 (ewi_grade 함수, lines 498-501)
  grade_high_threshold: 0.6     # 이 이상 = "고강도"
  grade_normal_threshold: 0.2   # 이 이상 = "보통", 미만 = "저강도"

# ─── CRE (Construction Risk Exposure) 설정 ─────────────────────────────────
# 출처: src/pipeline/metrics.py (lines 87-94)
cre:
  # CRE 계산 가중치
  personal_weight: 0.45         # 개인 위험 (피로도 + 단독작업)
  static_weight: 0.40           # 공간 정적 위험도
  dynamic_weight: 0.15          # 동적 밀집 압력

  # 동적 밀집 정규화
  density_scale: 30.0           # 정규화 기준 (30명/슬롯 = 1.0)
  density_cap: 1.0              # 상한

  # CRE 등급 판정 (cre_grade 함수, lines 503-506)
  grade_high_threshold: 0.6     # 이 이상 = "고위험"
  grade_warning_threshold: 0.3  # 이 이상 = "주의", 미만 = "정상"

  # 알림 임계값 (src/dashboard/components.py build_space_alerts 참조)
  critical_threshold: 0.8       # 즉시 조치 필요
  alert_threshold: 0.6          # 경고

# ─── SII (Spatial Intensity Index) 설정 ────────────────────────────────────
# 출처: src/pipeline/metrics.py (lines 508-511)
sii:
  # SII = EWI x static_norm (고강도 작업 + 위험 공간 동시 해당 작업자 탐지)
  grade_critical_threshold: 0.5  # 이 이상 = "집중관리"
  grade_warning_threshold: 0.25  # 이 이상 = "주의", 미만 = "정상"

# ─── 피로도 (Fatigue) 설정 ─────────────────────────────────────────────────
# 출처: src/pipeline/metrics.py (_calc_fatigue_scores, lines 272-320)
fatigue:
  # 연속 활성 기준
  active_ratio_threshold: 0.30  # 이 이상이면 "활성" 상태

  # 피로도 정규화
  normalization_minutes: 240.0  # 4시간(240분) 연속 = fatigue_score 1.0

  # 피로도 계산 가중치
  max_streak_weight: 0.7        # 최대 연속 활성 시간
  avg_streak_weight: 0.3        # 평균 연속 활성 시간

# ─── 단독작업 (Lone Work) 설정 ─────────────────────────────────────────────
# 출처: src/pipeline/lone_work.py (lines 8-9, 106-110)
lone_work:
  # 단독작업 판정 기준
  min_duration_minutes: 10      # 10분 이상 혼자이면 단독작업

  # 상태 판정 (status 함수, lines 105-110)
  critical_duration_minutes: 30 # 30분 이상 단독 = "critical"
  warning_duration_minutes: 10  # 10분 이상 단독 = "warning"

  # 실시간 감지 윈도우
  realtime_window_minutes: 10   # 최근 10분 내 단독작업자 탐지

# ─── 공간 정적 위험도 (Static Risk by Token) ───────────────────────────────
# 출처: src/pipeline/metrics.py (STATIC_RISK_BY_TOKEN, lines 58-83)
static_risk:
  min_value: 0.2
  max_value: 2.0

  # locus_token별 정적 위험도
  by_token:
    # 최고 위험 (hazard_5)
    confined_space: 2.0
    high_voltage: 2.0
    # 고위험 (hazard_4)
    mechanical_room: 1.8
    transit: 1.5              # 호이스트/클라이머 (수직 이동 설비)
    # 중위험 (hazard_3)
    outdoor_work: 1.3
    work_zone: 1.2
    # 저위험 / 게이트
    timeclock: 0.5
    main_gate: 0.3
    sub_gate: 0.3
    # 비작업
    breakroom: 0.2
    smoking_area: 0.2
    dining_hall: 0.2
    restroom: 0.2
    parking_lot: 0.2
    office: 0.3
    facility: 0.3
    # unmapped/unknown
    unknown: 0.5
    unmapped: 0.5

# ─── 공간 토큰 분류 ────────────────────────────────────────────────────────
# 출처: src/pipeline/metrics.py (lines 42-54)
tokens:
  # EWI 계산 대상 (작업 공간)
  work:
    - work_zone
    - mechanical_room
    - confined_space
    - high_voltage
    - transit           # 호이스트 등

  # EWI 제외 (이동/게이트)
  transit:
    - timeclock
    - main_gate
    - sub_gate
    - outdoor_work      # 공사현장 — FAB 진입 전 이동 경로

  # EWI 제외 (휴식/비작업)
  rest:
    - breakroom
    - smoking_area
    - dining_hall
    - restroom
    - parking_lot

  # 관리/시설
  admin:
    - office
    - facility

# ─── 근무시간 설정 ─────────────────────────────────────────────────────────
# 출처: config.py (WORK_START_HOUR, WORK_END_HOUR)
work_hours:
  start_hour: 5               # 05:00 이후 유효
  end_hour: 23                # 23:00 이전

  # 참고: 실제 교대 근무 패턴 (site_context.py에서 설명)
  # - 주간: 06:00~18:00
  # - 야간: 18:00~06:00

# ─── Journey 보정 설정 ─────────────────────────────────────────────────────
# 출처: src/pipeline/corrector.py (lines 31-38)
journey_correction:
  # Run-Length 플리커 보정
  max_flicker_run: 2          # 이 길이(분) 이하 + 앞뒤 동일 locus = 노이즈

  # 앵커 토큰 (짧아도 보정하지 않는 실제 이벤트 공간)
  anchor_tokens:
    - timeclock               # 타각기/게이트 — 출입 확인 이벤트
    - breakroom               # 휴게실
    - smoking_area            # 흡연 구역

# ─── 체류 카테고리 기준 (분) ───────────────────────────────────────────────
# 출처: core/schema/locus.py (DwellCategory)
dwell_thresholds:
  transit: 5                  # < 5분 = TRANSIT (통과)
  short_stay: 30              # 5~30분 = SHORT_STAY (단기)
  long_stay: 120              # 30~120분 = LONG_STAY (장기)
  # > 120분 또는 위험구역 = HAZARD_ZONE
